<main class="dashboard">
  <h1 class="dashboard__title">Общая информация</h1>

  <section class="dashboard__stats">
    <div class="stat-card">
      <h2 class="stat-card__title">Автомобилей</h2>
      <p class="stat-card__value">{{ totalCars }}</p>
    </div>

    <div class="stat-card">
      <h2 class="stat-card__title">Ремонтов</h2>
      <p class="stat-card__value">{{ totalRepairs }}</p>
    </div>

    <div class="stat-card">
      <h2 class="stat-card__title">Общая стоимость</h2>
      <p class="stat-card__value">
        {{ totalCost() | currency:'RUB':'symbol-narrow' }}
      </p>
    </div>
  </section>

  <button class="dashboard__button" routerLink="/repair-list">
    Перейти к записям
  </button>
</main>
